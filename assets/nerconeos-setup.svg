  <text class="cls-20" transform="translate(50.28 161.23)"><tspan class="cls-10" x="0" y="0">Ne</tspan><tspan class="cls-9" x="64.15" y="0">r</tspan><tspan class="cls-10" x="81.42" y="0">coneOS</tspan><tspan class="cls-2" x="261.47" y=".78">へようこそ！</tspan></text>
  <text class="cls-4" transform="translate(53.5 197.02)"><tspan x="0" y="0">使い始める前に、いくつかの設定を終わらせませんか？</tspan></text>
  <rect class="cls-15" x="50" y="326" width="650" height="704" rx="16" ry="16"/>
  <text class="cls-3" transform="translate(73 379.78)"><tspan x="0" y="0">・追加ドライバーの読み込み</tspan><tspan x="0" y="38.5">・ユーザーを追加</tspan><tspan x="0" y="77">・ネットワークに接続</tspan><tspan x="0" y="115.5">・セキュリティ機能の設定</tspan><tspan x="5.5" y="154">　・ユーザーデータの暗号化</tspan><tspan x="5.5" y="192.5">　・外部デバイス接続時の動作</tspan><tspan x="0" y="231">・パフォーマンスの自動評</tspan><tspan class="cls-1" x="264" y="231">価/</tspan><tspan x="305.62" y="231">設定変更</tspan><tspan x="5.5" y="269.5">　・デザインとアニメーション</tspan><tspan x="5.5" y="308">　・スワップの使用頻度</tspan><tspan x="5.5" y="346.5">　・ストレージ圧縮機能</tspan><tspan x="0" y="385">・オプション機能の設定</tspan><tspan x="5.5" y="423.5">　・A</tspan><tspan class="cls-1" x="62.88" y="423.5">I</tspan><tspan x="74.82" y="423.5">統合機能のセットアップ</tspan><tspan x="5.5" y="462">　・Linu</tspan><tspan class="cls-1" x="94.27" y="462">x</tspan><tspan x="110.72" y="462">互換性レイヤ</tspan><tspan class="cls-1" x="242.72" y="462">ー</tspan><tspan x="270.22" y="462">(LRFN)</tspan><tspan x="5.5" y="500.5">　・And</tspan><tspan class="cls-16" x="89.93" y="500.5">r</tspan><tspan x="98.16" y="500.5">oi</tspan><tspan class="cls-1" x="117.54" y="500.5">d</tspan><tspan x="136.68" y="500.5">アプリ実行環</tspan><tspan class="cls-1" x="268.68" y="500.5">境</tspan><tspan x="296.18" y="500.5">(ARFN)</tspan><tspan x="5.5" y="539">　・Wind</tspan><tspan class="cls-23" x="101.92" y="539">o</tspan><tspan x="115.1" y="539">w</tspan><tspan class="cls-1" x="132.75" y="539">s</tspan><tspan x="148.54" y="539">互換性レイヤ</tspan><tspan class="cls-1" x="280.54" y="539">ー</tspan><tspan x="308.04" y="539">(Wine)</tspan><tspan x="5.5" y="577.5">　・開発者向け機能の有効</tspan><tspan class="cls-1" x="269.5" y="577.5">化/</tspan><tspan x="311.12" y="577.5">無効化</tspan><tspan x="0" y="616">・ソフトウェア更新の受信方</tspan><tspan class="cls-1" x="286" y="616">法/</tspan><tspan x="327.62" y="616">タイミングの設定</tspan></text>
  <text class="cls-5" transform="translate(54.5 248.68)"><tspan x="0" y="0">時間がない場合は</tspan><tspan class="cls-22" x="112" y="0">、</tspan><tspan x="119" y="0">「後でセットアップ」を押して一時的にゲストユーザーを使用することもできます</tspan><tspan class="cls-22" x="637" y="0">。</tspan><tspan x="0" y="16">次回の起動時、またはゲストユーザーのデスクトップにあるショートカットからいつでもセットアップに戻ることができます</tspan><tspan class="cls-22" x="784" y="16">。</tspan><tspan x="0" y="32">ゲストユーザー内で行ったほとんどの変更は次回の起動時にリセットされます。重要なデータを取り扱う場合は先にセットアップを済ませることをおすすめします</tspan><tspan class="cls-22" x="1022" y="32">。</tspan></text>
