  <text class="cls-22" transform="translate(150.82 494.81)"><tspan class="cls-25" x="0" y="0">Ne</tspan><tspan class="cls-26" x="64.15" y="0">r</tspan><tspan class="cls-25" x="81.42" y="0">coneOS</tspan><tspan class="cls-8" x="261.47" y=".78">へようこそ！</tspan></text>
  <text class="cls-10" transform="translate(154.04 530.61)"><tspan x="0" y="0">使い始める前に、いくつかの設定を終わらせませんか？</tspan></text>
  <text class="cls-9" transform="translate(155.04 582.26)"><tspan x="0" y="0">時間がない場合は</tspan><tspan class="cls-27" x="112" y="0">、</tspan><tspan x="119" y="0">「後でセットアップ」を押して一時的にゲストユーザーを使用することもできます</tspan><tspan class="cls-27" x="637" y="0">。</tspan><tspan x="0" y="16">次回の起動時、またはゲストユーザーのデスクトップにあるショートカットからいつでもセットアップに戻ることができます</tspan><tspan class="cls-27" x="784" y="16">。</tspan><tspan x="0" y="32">ゲストユーザー内で行ったほとんどの変更は次回の起動時にリセットされます。重要なデータを取り扱う場合は先にセットアップを済ませることをおすすめします</tspan><tspan class="cls-27" x="1022" y="32">。</tspan></text>
